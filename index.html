<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Which NBA Player Are You?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<h1 class="text-center mt-4">Which NBA Player Are You?</h1>

<!-- Question 1 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>You’re down by 5 with 30 seconds left. What do you do?</h4>
    <div class="row g-2">
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="3">Take the final shot confidently</button>
      </div>
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="1">Set up a teammate strategically</button>
      </div>
    </div>
  </div>
</div>

<!-- Question 2 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>Pick your playing style:</h4>
    <div class="row g-2">
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="3">Aggressive scorer</button>
      </div>
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="1">Playmaker / facilitator</button>
      </div>
    </div>
  </div>
</div>

<!-- Question 3 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>Your team looks to you in crunch time. What do you do?</h4>
    <div class="row g-2">
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="3">Take charge and make a bold move</button>
      </div>
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="1">Analyze and call the right play</button>
      </div>
    </div>
  </div>
</div>

<!-- Question 4 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>What motivates you most on the court?</h4>
    <div class="row g-2">
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="3">Winning and leadership</button>
      </div>
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="1">Teamwork and strategy</button>
      </div>
    </div>
  </div>
</div>

<!-- Question 5 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>A tough defender is blocking your path. What do you do?</h4>
    <div class="row g-2">
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="3">Take the risk and attack aggressively</button>
      </div>
      <div class="col-6">
        <button class="btn btn-outline-primary w-100 answer-btn" data-answer="1">Find an open teammate or pass strategically</button>
      </div>
    </div>
  </div>
</div>

<!-- Show Result Button -->
<div class="container d-flex justify-content-center">
  <button id="show-result" class="btn btn-success my-4">Show Results</button>
</div>

<!-- Result Container -->
<div class="container d-flex justify-content-center">
  <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
    <h3>Your Result:</h3>
    <p id="result-text"></p>
  </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
